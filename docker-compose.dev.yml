services:
  rpi-mqtt-relay-dev:
    image: ghcr.io/migueldomingues/rpi-mqtt-relay:dev
    container_name: rpi-mqtt-relay-dev
    restart: unless-stopped
    privileged: true
    volumes:
      # GPIO and system access
      - /sys:/sys
      - /dev:/dev
      # Configuration file
      - ./config.yaml:/app/config.yaml
    environment:
      # Optional: Add any environment variables your app needs
      - TZ=UTC
    # Optional: Uncomment for logging
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"
