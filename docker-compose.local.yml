services:
  rpi-mqtt-relay-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: rpi-mqtt-relay-local
    restart: unless-stopped
    privileged: true
    volumes:
      # GPIO and system access
      - /sys:/sys
      - /dev:/dev
      # Configuration file
      - ./config.yaml:/app/config.yaml
    environment:
      # Optional: Add any environment variables your app needs
      - TZ=UTC
    ports:
      - "5000:5000"  # Expose Flask web UI on host:container
    # Optional: Uncomment for logging
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"
